services:
  - type: web
    name: real-estate-management-backend
    env: node
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        sync: false
      - key: DATA_DIR
        value: /var/data
    disk:
      name: real-estate-data
      mountPath: /var/data
      sizeGB: 1
